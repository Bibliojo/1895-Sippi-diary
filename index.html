<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sippi Diary 1895</title>

  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #f4f1ea;
      color: #222;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      text-align: center;
    }

    .intro {
      text-align: center;
      color: #555;
      max-width: 800px;
      margin: 0 auto 24px;
      line-height: 1.5;
    }

    .book-shell {
      background: #e7e0d2;
      border: 1px solid #c9c1b4;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      padding: 20px;
    }

    .viewer {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1b1b1b;
      border-radius: 10px;
      min-height: 72vh;
      padding: 20px;
    }

    .viewer img {
      max-width: 100%;
      max-height: 72vh;
      object-fit: contain;
      box-shadow: 0 8px 24px rgba(0,0,0,0.28);
      background: white;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      border: none;
      background: #4f2683;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background: #3d1d66;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .page-info {
      min-width: 180px;
      text-align: center;
      font-size: 1rem;
      color: #333;
    }

    .caption {
      text-align: center;
      margin-top: 10px;
      color: #666;
      font-size: 0.95rem;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Dr. Sippi Diary, 1895</h1>

    <p class="intro">
      Use the buttons or arrow keys to move through the diary pages.
    </p>

    <div class="book-shell">
      <div class="viewer">
        <img id="pageImage" src="" alt="Diary page">
      </div>

      <div class="controls">
        <button id="firstBtn">First</button>
        <button id="prevBtn">Previous</button>
        <div class="page-info" id="pageInfo">Page 1</div>
        <button id="nextBtn">Next</button>
        <button id="lastBtn">Last</button>
      </div>

      <p class="caption">Digital facsimile viewer</p>
    </div>
  </div>

  <script>
    const totalPages = 20;  // 👈 change this as you add more pages

    const imageFolder = "images/";
    const imageExtension = ".jpg";

    const pages = [];

    for (let i = 1; i <= totalPages; i++) {
      const num = String(i).padStart(5, "0"); // 👈 IMPORTANT: matches page00001.jpg
      pages.push(`${imageFolder}page${num}${imageExtension}`);
    }

    let currentPage = 0;

    const pageImage = document.getElementById("pageImage");
    const pageInfo = document.getElementById("pageInfo");

    const firstBtn = document.getElementById("firstBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const lastBtn = document.getElementById("lastBtn");

    function updatePage() {
      pageImage.src = pages[currentPage];
      pageImage.alt = `Diary page ${currentPage + 1}`;
      pageInfo.textContent = `Page ${currentPage + 1} of ${pages.length}`;

      firstBtn.disabled = currentPage === 0;
      prevBtn.disabled = currentPage === 0;
      nextBtn.disabled = currentPage === pages.length - 1;
      lastBtn.disabled = currentPage === pages.length - 1;
    }

    firstBtn.onclick = function () {
      currentPage = 0;
      updatePage();
    };

    prevBtn.onclick = function () {
      if (currentPage > 0) {
        currentPage--;
        updatePage();
      }
    };

    nextBtn.onclick = function () {
      if (currentPage < pages.length - 1) {
        currentPage++;
        updatePage();
      }
    };

    lastBtn.onclick = function () {
      currentPage = pages.length - 1;
      updatePage();
    };

    document.addEventListener("keydown", function (event) {
      if (event.key === "ArrowLeft" && currentPage > 0) {
        currentPage--;
        updatePage();
      }

      if (event.key === "ArrowRight" && currentPage < pages.length - 1) {
        currentPage++;
        updatePage();
      }
    });

    updatePage();
  </script>
</body>
</html>
